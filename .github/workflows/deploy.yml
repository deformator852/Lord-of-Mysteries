build:
  runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - run: npm ci

    - run: npm run build
      env:
        BASE_PATH: /${{ github.event.repository.name }}/

    - uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist